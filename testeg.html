<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fluxo de Gotículas - Modo Noturno</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Fundo quase preto para máxima imersão */
            background-color: #030508;
        }

        canvas {
            display: block;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(200, 210, 230, 0.6);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            pointer-events: none;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="content">
        <h2 style="font-weight: 200;">Quietude</h2>
    </div>

    <canvas id="dropletCanvas"></canvas>

    <script>
        const canvas = document.getElementById('dropletCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let droplets = [];
        
        const config = {
            count: 100,            // Quantidade equilibrada
            speedMin: 0.05,        // Ainda mais lento (mínimo)
            speedMax: 0.4,         // Ainda mais lento (máximo)
            baseColor: '180, 200, 230'
        };

        class Droplet {
            constructor() {
                this.init(true);
            }

            init(randomX = false) {
                this.y = Math.random() * canvas.height;
                this.x = randomX ? (Math.random() * canvas.width) : -50;
                
                this.z = Math.random(); 
                
                // Velocidade reduzida propositalmente
                this.speed = (this.z * (config.speedMax - config.speedMin) + config.speedMin) * 0.8;
                this.radius = this.z * 3 + 0.5; 
                this.opacity = this.z * 0.2 + 0.02; // Gotas bem sutis
                
                this.oscillation = Math.random() * 0.3;
                this.oscSpeed = Math.random() * 0.01;
                this.time = Math.random() * 100;
            }

            draw() {
                this.time += this.oscSpeed;
                const currentY = this.y + Math.sin(this.time) * 15 * this.oscillation;

                ctx.beginPath();
                
                let grad = ctx.createRadialGradient(this.x, currentY, 0, this.x, currentY, this.radius);
                grad.addColorStop(0, `rgba(${config.baseColor}, ${this.opacity})`);
                grad.addColorStop(1, `rgba(${config.baseColor}, 0)`);

                ctx.fillStyle = grad;
                ctx.arc(this.x, currentY, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += this.speed;

                if (this.x > canvas.width + 50) {
                    this.init(false);
                }
                this.draw();
            }
        }

        function initScene() {
            droplets = [];
            for (let i = 0; i < config.count; i++) {
                droplets.push(new Droplet());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            droplets.forEach(d => d.update());
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initScene();
        });

        initScene();
        animate();
    </script>
</body>
</html>
