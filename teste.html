<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuva Realista e Lenta no Vidro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fundo preto enquanto carrega */
        }

        /* A imagem original fica oculta, o Rainyday usa o canvas */
        #background {
            display: none;
        }

        /* O canvas que o Rainyday cria preenche a tela */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Conteúdo sobre o fundo */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            z-index: 10; /* Garante que o texto fique acima da chuva */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none; /* Permite clicar através do texto */
        }
    </style>
</head>
<body>

    <img id="background" alt="background" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1920" />

    <div class="content">
        <h1>Chuva no Vidro</h1>
        <p>Animação ultra lenta e realista.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/rainyday.js@1.1.0/rainyday.min.js"></script>
    
    <script>
        function playRain() {
            const image = document.getElementById('background');
            
            image.onload = function() {
                // Configuração básica do Rainyday.js
                const engine = new Rainyday({
                    image: this, // A imagem de fundo
                    blur: 10,    // Desfoca o fundo para dar profundidade
                    opacity: 1,
                    parentElement: document.body // Onde o canvas será inserido
                });

                // --- CONFIGURAÇÃO DA CHUVA ---
                // O método 'rain' define as camadas de gotas.
                
                // Camada 1: Gotas minúsculas e quase estáticas (o 'grudado')
                // engine.rain([ [tamanho_min, tamanho_max, frequencia] ], tempo_transicao)
                engine.rain([
                    [1, 2, 20] // Gotas pequenas (1-2), frequência alta (20)
                ], 100);

                // Camada 2: Gotas médias que escorrem muito devagar
                engine.rain([
                    [3, 5, 0.5] // Gotas médias (3-5), frequência muito baixa (0.5)
                ], 100);

                // --- AJUSTE DE VELOCIDADE (Ultra Lento) ---
                // Vamos sobrescrever a velocidade global de queda.
                // Valores maiores = mais lento. Padrão costuma ser 10-20.
                engine.gravity = 100; // Define a "força da gravidade" das gotas

                // Para gotas que grudam, diminuímos a chance de escorrer:
                engine.trailOptions = {
                    smooth: true,
                    density: 0.1, // Menos rastro
                    strength: 0.2  // Rastro mais fraco
                };
            };

            // Se a imagem já estiver em cache, o onload não dispara. Forçamos aqui.
            if (image.complete) {
                image.onload();
            }
        }

        // Inicia a chuva após o carregamento da janela
        window.onload = playRain;

        // Ajusta o canvas se a janela for redimensionada
        window.addEventListener('resize', function() {
            // O Rainyday não lida bem com resize nativamente sem reiniciar.
            // Para um fundo, é melhor recarregar o script ou aceitar o esticamento.
            location.reload(); 
        });
    </script>
</body>
</html>
