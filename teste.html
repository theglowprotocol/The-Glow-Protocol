<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chuva Suave e Realista</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita barras de rolagem */
            /* Fundo escuro levemente azulado para contrastar com a água */
            background-color: #0d1117; 
        }

        canvas {
            display: block;
        }

        /* Conteúdo de exemplo sobre o fundo */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            pointer-events: none; /* Permite interações com o fundo, se necessário */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Chuva Serena</h1>
        <p>Um ambiente calmo e relaxante.</p>
    </div>

    <canvas id="rainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');

        // Configuração inicial do tamanho do Canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let particles = [];
        
        // --- CONFIGURAÇÕES DA CHUVA ---
        const config = {
            count: 150,           // Quantidade de gotas (aumentado para compensar a lentidão)
            speedMin: 0.5,        // Velocidade mínima (MUITO mais lento)
            speedMax: 1.5,        // Velocidade máxima (MUITO mais lento)
            lengthMin: 5,         // Comprimento mínimo da gota
            lengthMax: 25,        // Comprimento máximo da gota
            opacityMin: 0.05,     // Transparência mínima (quase invisível)
            opacityMax: 0.25,     // Transparência máxima (suave)
            color: '174, 194, 224' // Cor RGB base das gotas
        };

        class RainDrop {
            constructor() {
                this.init(true); // 'true' para espalhar inicialmente por toda a tela
            }

            init(randomY = false) {
                this.x = Math.random() * canvas.width;
                // Se randomY for true, espalha na tela toda. Se false, começa no topo.
                this.y = randomY ? (Math.random() * canvas.height) : -config.lengthMax;
                
                // Define características aleatórias dentro dos limites da configuração
                this.length = Math.random() * (config.lengthMax - config.lengthMin) + config.lengthMin;
                this.speed = Math.random() * (config.speedMax - config.speedMin) + config.speedMin;
                this.opacity = Math.random() * (config.opacityMax - config.opacityMin) + config.opacityMin;
                this.lineWidth = Math.random() * 0.8 + 0.2; // Espessuras variadas para profundidade
            }

            draw() {
                // Cria um gradiente linear para a gota (suaviza a ponta)
                // Começa na cabeça da gota (y) e termina na cauda (y + length)
                let gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.length);
                
                // A "cabeça" da gota é mais visível
                gradient.addColorStop(0, `rgba(${config.color}, ${this.opacity})`);
                // A "cauda" desaparece suavemente
                gradient.addColorStop(1, `rgba(${config.color}, 0)`);

                ctx.beginPath();
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.lineWidth;
                ctx.lineCap = 'round'; // Pontas arredondadas para maior suavidade
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
            }

            update() {
                this.y += this.speed;

                // Resetar a gota quando ela sai da tela
                if (this.y > canvas.height) {
                    this.init(false); // Reinicia no topo
                }
                this.draw();
            }
        }

        // Cria todas as partículas
        function initRain() {
            particles = [];
            for (let i = 0; i < config.count; i++) {
                particles.push(new RainDrop());
            }
        }

        // Loop de animação
        function animate() {
            // Limpa o canvas. O valor '0.3' no alpha cria um rastro muito leve e suave.
            ctx.fillStyle = 'rgba(13, 17, 23, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Atualiza e desenha cada gota
            particles.forEach(drop => drop.update());
            
            requestAnimationFrame(animate);
        }

        // Evento de redimensionamento da janela
        window.addEventListener('resize', () => {
            resizeCanvas();
            initRain(); // Reinicia a chuva para se adaptar ao novo tamanho
        });

        // Início
        initRain();
        animate();
    </script>
</body>
</html>
